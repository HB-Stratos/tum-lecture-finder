services:
  server:
    build:
      context: .
    restart: unless-stopped
    ports:
      - 8000:8000
    volumes:
      - tlf-data:/app/data
    environment:
      - TLF_TRUST_PROXY=1
      - TLF_JSON_LOGS=1
      - TLF_UPDATE_CRON=0 3 * * *
      - TLF_UPDATE_SEMESTERS=4
      - TLF_FULL_UPDATE_EVERY=7
      - TLF_PRELOAD_MODEL=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

volumes:
  tlf-data:
